<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Archive · Alta Zero</title>
<meta name="description" content="The full Alta Zero archive. 114 curated blanks, numbered 001 to 114. The branding lives on the tag.">
<link rel="icon" href="img/az-penguin.png">
<meta property="og:type" content="website">
<meta property="og:title" content="The Archive · Alta Zero">
<meta property="og:description" content="114 curated blanks, numbered 001 to 114. The mark is on the tag.">
<meta property="og:image" content="img/campaign.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="az-top"></div>

<div class="wrap">
  <div class="archive-head">
    <div class="title">The Archive</div>
    <p>A finite, considered wardrobe you build one piece at a time. Numbered 001 to 114. When a piece retires, its number retires with it.</p>
  </div>

  <div class="toggle" id="toggle"></div>

  <div class="archive-meta" id="meta">
    <span class="items">114 items</span>
    <button class="filter" type="button" id="filterBtn">Filter
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><line x1="3" y1="6" x2="21" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="9" y1="18" x2="15" y2="18"/></svg>
    </button>
  </div>

  <div class="grid four" id="grid"></div>
</div>

<div id="az-foot" style="margin-top:64px"></div>

<script src="archive-data.js"></script>
<script src="site-content.js"></script>
<script src="app.js"></script>
<script>
  AZ.mount({active:'archive'});
  AZ.renderArchive(
    document.getElementById('toggle'),
    document.getElementById('meta'),
    document.getElementById('grid')
  );
  document.getElementById('filterBtn').addEventListener('click', AZ.openSearch);
</script>
</body>
</html>
