<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alta Zero · A House Of Blanks</title>
<meta name="description" content="Alta Zero is a textile house of beautiful blanks, quietly made. The whole story lives on the tag. Start from zero. Go higher.">
<link rel="icon" href="img/az-penguin.png">
<meta property="og:type" content="website">
<meta property="og:title" content="Alta Zero · A House Of Blanks">
<meta property="og:description" content="Beautiful blanks, quietly made. The mark is on the tag. Start from zero. Go higher.">
<meta property="og:image" content="img/campaign.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="az-top"></div>

<header class="home-hero">
  <a class="hero-enter" href="archive.html">Enter The Archive</a>
  <div class="hero-media"><img src="img/campaign.png" alt="Alta Zero campaign: the mountain ridge, the one who went the other way"></div>
  <div class="hero-mark"><img src="img/az-wordmark-stacked.png" alt="Alta Zero"></div>
</header>

<section class="spoken reveal">
  <div class="sp-k">A Textile House · Est. At Ground Zero</div>
  <div class="sp-line" id="spLine"></div>
  <div class="sp-sub" id="spSub"></div>
</section>

<section class="ed reveal">
  <a href="tags.html" class="ed-img"><img src="img/gm1.png" alt="Folded Alta Zero pieces with hangtag"></a>
  <div class="ed-bar">
    <span class="ed-head">We moved the whole brand to the inside</span>
    <a class="link" href="tags.html">Read The Tags</a>
  </div>
</section>

<section class="look reveal" id="lookbook">
  <span class="look-idx" id="lk1idx"></span>
  <img src="img/gm3.png" alt="Alta Zero, layers for the cold ground and the long climb">
  <div class="look-cap">
    <span class="lk-t" id="lk1t"></span>
    <span class="lk-c" id="lk1c"></span>
  </div>
</section>

<div class="wrap">
  <div class="sec-head">
    <h2>The Essentials</h2>
    <a class="link" href="collection.html?c=the-essentials-ten">View The Edit</a>
  </div>
  <div class="grid four" id="essentials"></div>
</div>

<section class="look reveal" style="margin-top:56px">
  <span class="look-idx" id="lk2idx"></span>
  <img src="img/gm4.png" alt="Alta Zero dense fleece that stands almost on its own">
  <div class="look-cap">
    <span class="lk-t" id="lk2t"></span>
    <span class="lk-c" id="lk2c"></span>
  </div>
</section>

<div class="wrap">
  <div class="sec-head">
    <h2>The Archive, In Brief</h2>
    <a class="link" href="archive.html">View All 114</a>
  </div>
  <div class="grid four" id="preview"></div>
</div>

<section class="spoken reveal" style="border-top:1px solid var(--hair)">
  <div class="sp-k">The Mark Is On The Tag</div>
  <div class="sp-line" id="spLine2"></div>
  <div class="sp-sub" id="spSub2"></div>
</section>

<div id="az-foot"></div>

<script src="archive-data.js"></script>
<script src="site-content.js"></script>
<script src="app.js"></script>
<script>
  AZ.mount({active:'home'});

  document.getElementById('spLine').textContent = SPOKEN[0].line;
  document.getElementById('spSub').textContent  = SPOKEN[0].sub;
  document.getElementById('spLine2').textContent = SPOKEN[2].line;
  document.getElementById('spSub2').textContent  = SPOKEN[2].sub;

  var l1 = LOOKBOOK[1], l2 = LOOKBOOK[2];
  document.getElementById('lk1idx').textContent = 'Lookbook · 0'+l1.slide;
  document.getElementById('lk1t').textContent = l1.title;
  document.getElementById('lk1c').textContent = l1.caption;
  document.getElementById('lk2idx').textContent = 'Lookbook · 0'+l2.slide;
  document.getElementById('lk2t').textContent = l2.title;
  document.getElementById('lk2c').textContent = l2.caption;

  var ess = COLLECTIONS.find(function(c){return c.slug==='the-essentials-ten';});
  AZ.renderPreview(document.getElementById('essentials'), ess.memberArchiveNumbers.slice(0,8).map(AZ.padN));
  AZ.renderPreview(document.getElementById('preview'),
    ['001','020','037','015','054','064','111','097']);
</script>
</body>
</html>
