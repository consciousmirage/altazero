<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alta Zero · Product</title>
<meta name="description" content="An Alta Zero blank. The mark is on the tag.">
<link rel="icon" href="img/az-penguin.png">
<meta property="og:type" content="product">
<meta property="og:title" content="Alta Zero · Product">
<meta property="og:description" content="An Alta Zero blank. The mark is on the tag.">
<meta property="og:image" content="img/campaign.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="az-top"></div>

<section class="pdp" id="pdp"></section>

<div class="wrap pdp-related">
  <div class="sec-head">
    <h2>Related Pieces</h2>
    <a class="link" href="archive.html">View All 114</a>
  </div>
  <div class="grid four" id="more" style="margin-bottom:64px"></div>
</div>

<div id="az-foot"></div>

<script src="archive-data.js"></script>
<script src="product-data.js"></script>
<script src="site-content.js"></script>
<script src="app.js"></script>
<script>
  AZ.mount({active:''});

  var q = new URLSearchParams(location.search);
  var n = q.get('n') || '020';
  var p = AZ.byNum(n) || AZ.byNum('020');
  var L = listingFor(p);
  document.title = p.name.toUpperCase() + ' · Alta Zero';
  var md = document.querySelector('meta[name="description"]');
  if(md) md.setAttribute('content', L.desc);

  /* build the gallery shots: piece, neck tag, campaign */
  var pieceMain = p.img
    ? '<img src="img/'+p.img+'.png" alt="'+p.name+'">'
    : AZ.specimenHTML(p);
  var pieceThumb = p.img
    ? '<img src="img/'+p.img+'.png" alt="'+p.name+'">'
    : AZ.specimenHTML(p);
  var tag = AZ.tagShot(p);
  var shots = [
    { main: pieceMain, thumb: pieceThumb },
    { main: '<img src="'+tag+'" alt="Alta Zero woven neck label">', thumb: '<img src="'+tag+'" alt="">' },
    { main: '<img class="cover" src="img/campaign.png" alt="Alta Zero campaign">', thumb: '<img class="cover" src="img/campaign.png" alt="">' }
  ];

  var thumbsHTML = shots.map(function(s,i){
    return '<button class="'+(i===0?'on':'')+'" data-i="'+i+'" aria-label="View image '+(i+1)+'">'+s.thumb+'</button>';
  }).join('');

  var sizes = ['S','M','L','XL','2XL'];
  var nNum = parseInt(p.n,10);
  var soldout = function(i){ return (nNum+i)%6===0; };

  document.getElementById('pdp').innerHTML =
    '<div class="pdp-media">'+
      '<div class="gallery-main" id="galMain">'+shots[0].main+'</div>'+
      '<div class="gallery-thumbs" id="galThumbs">'+thumbsHTML+'</div>'+
    '</div>'+
    '<div class="pdp-info">'+
      '<div class="head"><h1>'+p.name+'</h1><span class="price">$'+p.price+'</span></div>'+
      '<div class="meta">No. '+p.n+' / 114 · '+AZ.colourOf(p)+' · '+p.style+'</div>'+
      '<p class="desc">'+L.desc+'</p>'+
      '<div class="size-row"><span class="lbl">Size</span>'+
        '<a class="link size-guide" href="#" id="sizeGuideLink">'+
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="8" width="18" height="8"/><line x1="8" y1="8" x2="8" y2="12"/><line x1="12" y1="8" x2="12" y2="13"/><line x1="16" y1="8" x2="16" y2="12"/></svg>'+
        'Size Guide</a></div>'+
      '<div class="sizes" id="sizes">'+
        sizes.map(function(s,i){
          return '<button class="'+(soldout(i)?'soldout':(i===1?'sel':''))+'"'+(soldout(i)?' disabled':'')+'>'+s+'</button>';
        }).join('')+
      '</div>'+
      '<button class="addbag" id="addbag">Add To Bag · $'+p.price+'</button>'+
      '<p class="note">Made to order in about 5 to 8 business days</p>'+
      '<div class="acc-group">'+
        '<details class="acc" open><summary><span class="acc-t">Shipping &amp; Made To Order</span><span class="acc-s">5 to 8 business days</span><span class="acc-c">&rsaquo;</span></summary>'+
        '<div class="acc-body">Every Alta Zero piece is made to order, so nothing sits in a warehouse waiting. Give it about 5 to 8 business days to be made, then standard shipping on top. You get a tracking link the moment it leaves us.</div></details>'+
        '<details class="acc"><summary><span class="acc-t">The Tag</span><span class="acc-s">The mark is on the tag</span><span class="acc-c">&rsaquo;</span></summary>'+
        '<div class="acc-body">We moved the whole brand to the inside, to a woven neck label and a hangtag you have to hold to read. No logo doing the talking, just the cut, the cloth, and the care at your neck. This is No. '+p.n+' of 114. When a piece retires, its number retires with it.</div></details>'+
        '<details class="acc"><summary><span class="acc-t">Materials &amp; Care</span><span class="acc-s">'+p.cat+'</span><span class="acc-c">&rsaquo;</span></summary>'+
        '<div class="acc-body">'+L.mat+'. '+L.fit+'. '+L.care+'</div></details>'+
      '</div>'+
    '</div>';

  /* gallery swap */
  var galMain = document.getElementById('galMain');
  var galThumbs = document.getElementById('galThumbs');
  galThumbs.addEventListener('click', function(e){
    var b = e.target.closest('button'); if(!b) return;
    var i = parseInt(b.dataset.i,10);
    galMain.innerHTML = shots[i].main;
    galThumbs.querySelectorAll('button').forEach(function(x){ x.classList.remove('on'); });
    b.classList.add('on');
  });

  /* size selector */
  var sz = document.getElementById('sizes');
  sz.addEventListener('click', function(e){
    var b = e.target.closest('button'); if(!b || b.disabled) return;
    sz.querySelectorAll('button').forEach(function(x){ x.classList.remove('sel'); });
    b.classList.add('sel');
  });

  /* size guide modal */
  document.getElementById('sizeGuideLink').addEventListener('click', function(e){
    e.preventDefault(); AZ.openSizeGuide();
  });

  /* add to bag */
  document.getElementById('addbag').addEventListener('click', function(){
    var selBtn = sz.querySelector('button.sel');
    if(!selBtn){ this.textContent = 'Select A Size First'; var t=this; setTimeout(function(){ t.textContent='Add To Bag · $'+p.price; },1400); return; }
    AZ.Bag.add({ n:p.n, name:p.name, price:p.price, img:p.img, size:selBtn.textContent });
    AZ.openBag();
  });

  /* related: 4 from the same group, wrap around */
  var pool = ARCHIVE.filter(function(x){ return x.g===p.g && x.n!==p.n; });
  var others = (pool.length>=4 ? pool : ARCHIVE.filter(function(x){ return x.n!==p.n; })).slice(0,4);
  AZ.renderGrid(document.getElementById('more'), others);
</script>
</body>
</html>
